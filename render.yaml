databases:
  - name: sport_shop_db
    databaseName: sport_shop
    plan: free

services:
  # Backend Web Service
  - type: web
    name: sport-shop-backend
    env: node
    plan: free
    rootDir: new-backend
    buildCommand: npm install && npm run build
    # Render chạy migration tự động trước khi start app
    startCommand: npm run migrate:deploy && npm run seed:prod && npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sport_shop_db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_BASE_URL
        value: https://sport-shop-frontend.onrender.com
      - key: CORS_ORIGIN
        value: https://sport-shop-frontend.onrender.com
      - key: VNP_TMN_CODE
        value: "REPLACE_ME_IN_DASHBOARD"
      - key: VNP_HASH_SECRET
        value: "REPLACE_ME_IN_DASHBOARD"
      - key: VNP_RETURN_URL
        value: https://sport-shop-backend.onrender.com/api/payment/vnpay-callback

  # Frontend Static Site
  - type: web
    name: sport-shop-frontend
    env: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://sport-shop-backend.onrender.com/api
      - key: VITE_WS_URL
        value: https://sport-shop-backend.onrender.com
